name: Publish to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevents wasting runners and deploying an outdated commit when pushes
# happen in quick succession.
concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      GIST_ID: ${{ vars.GIST_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Install pnpm before setup-node so setup-node can resolve the pnpm
      # store when configuring its built-in dependency cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # BUILD_INFO is exported before the build so build tools, Vite config,
      # and other scripts can access it through process.env.BUILD_INFO.
      - name: Prepare build info
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DATE="$(
            TZ=Etc/GMT+3 \
              date '+%d/%m/%Y %H:%M:%S GMT-3'
          )"

          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_INFO="${BUILD_DATE} | commit ${GITHUB_SHA}"

          {
            echo "BUILD_INFO=${BUILD_INFO}"
          } >> "$GITHUB_ENV"

          {
            echo "date=${BUILD_DATE}"
            echo "short_sha=${SHORT_SHA}"
            echo "build_info=${BUILD_INFO}"
          } >> "$GITHUB_OUTPUT"

          echo "BUILD_INFO=${BUILD_INFO}"

      - name: Build
        run: pnpm build

      - name: Vite Build
        run: pnpm build:vite

      - name: Verify build
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "dist/roderuda.js"
            "dist/roderuda.min.js"
            "dist/roderuda.with-comments.js"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "::error file=$file::Required build artifact is missing or empty"
              exit 1
            fi
          done

          echo "Build artifacts:"
          du -h "${required_files[@]}"

      - name: Generate build metadata
        shell: bash
        run: |
          set -euo pipefail

          cat > dist/build.json <<JSON
          {
            "commit": "${GITHUB_SHA}",
            "commitShort": "${{ steps.metadata.outputs.short_sha }}",
            "builtAt": "${{ steps.metadata.outputs.date }}",
            "timezone": "GMT-3",
            "buildInfo": "${BUILD_INFO}"
          }
          JSON

      - name: Prepare GitHub Pages
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p pages/roderuda

          cp \
            dist/roderuda.js \
            dist/roderuda.min.js \
            dist/roderuda.with-comments.js \
            dist/build.json \
            pages/roderuda/

          # Sourcemaps are optional.
          for map in \
            dist/roderuda.js.map \
            dist/roderuda.min.js.map
          do
            if [[ -f "$map" ]]; then
              cp "$map" pages/roderuda/
            fi
          done

          cat > pages/roderuda/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta
              name="viewport"
              content="width=device-width, initial-scale=1.0"
            >
            <title>RodEruda CDN</title>

            <style>
              body {
                font-family: sans-serif;
                max-width: 820px;
                margin: 40px auto;
                padding: 0 20px;
              }

              pre {
                background: #f4f4f4;
                padding: 12px;
                border-radius: 4px;
                overflow-x: auto;
              }

              a {
                color: #0070f3;
              }
            </style>
          </head>

          <body>
            <h1>RodEruda</h1>

            <p>
              Console for Mobile Browsers — fork of
              <a href="https://github.com/liriliri/eruda">Eruda</a>
            </p>

            <h2>Files</h2>

            <ul>
              <li>
                <a href="roderuda.js">roderuda.js</a>
                — non-minified with sourcemap
              </li>

              <li>
                <a href="roderuda.min.js">roderuda.min.js</a>
                — minified with sourcemap
              </li>

              <li>
                <a href="roderuda.with-comments.js">
                  roderuda.with-comments.js
                </a>
                — non-minified, comments preserved
              </li>

              <li>
                <a href="build.json">build.json</a>
                — build metadata
              </li>
            </ul>

            <h2>Usage</h2>

            <pre>&lt;script src="https://oirodolfo.github.io/eruda-console-browser/roderuda/roderuda.js"&gt;&lt;/script&gt;
          &lt;script&gt;RodEruda.init();&lt;/script&gt;</pre>

            <pre>&lt;!-- Minified --&gt;
          &lt;script src="https://oirodolfo.github.io/eruda-console-browser/roderuda/roderuda.min.js"&gt;&lt;/script&gt;
          &lt;script&gt;RodEruda.init();&lt;/script&gt;</pre>

            <pre>&lt;!-- With comments preserved --&gt;
          &lt;script src="https://oirodolfo.github.io/eruda-console-browser/roderuda/roderuda.with-comments.js"&gt;&lt;/script&gt;
          &lt;script&gt;RodEruda.init();&lt;/script&gt;</pre>

            <p>
              <a href="https://github.com/oirodolfo/eruda-console-browser">
                GitHub Repository
              </a>
            </p>
          </body>
          </html>
          HTML

      - name: Update Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GIST_ID:-}" ]]; then
            echo "::error::GIST_ID repository variable is not configured"
            exit 1
          fi

          # Build the JSON payload from files instead of passing bundle
          # contents as shell arguments. This is safer for large builds.
          jq \
            --null-input \
            --arg description \
              "RodEruda | ${BUILD_INFO}" \
            --rawfile roderuda \
              dist/roderuda.js \
            --rawfile roderuda_min \
              dist/roderuda.min.js \
            --rawfile build \
              dist/build.json \
            '{
              description: $description,
              files: {
                "roderuda.js": {
                  content: $roderuda
                },
                "roderuda.min.js": {
                  content: $roderuda_min
                },
                "build.json": {
                  content: $build
                }
              }
            }' \
          | gh api \
              --method PATCH \
              "gists/${GIST_ID}" \
              --input -

          echo "Gist updated: ${BUILD_INFO}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: roderuda-dist-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/roderuda.js
            dist/roderuda.min.js
            dist/roderuda.with-comments.js
            dist/roderuda.js.map
            dist/roderuda.min.js.map
            dist/build.json
          if-no-files-found: warn
          compression-level: 9
