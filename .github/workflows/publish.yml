name: Publish to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable corepack
        run: corepack enable
        
      - name: Prepare pnpm
        run: corepack prepare pnpm@11.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        run: pnpm ci

      - name: Build
        run: pnpm build

      - name: Verify dist files
        run: |
          test -f dist/roderuda.js
          test -f dist/roderuda.min.js
          test -f dist/roderuda.with-comments.js

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p pages/roderuda
          cp dist/roderuda.js         pages/roderuda/roderuda.js
          cp dist/roderuda.min.js     pages/roderuda/roderuda.min.js
          cp dist/roderuda.with-comments.js pages/roderuda/roderuda.with-comments.js
          # Copy sourcemaps if present
          cp dist/roderuda.js.map     pages/roderuda/ 2>/dev/null || true
          cp dist/roderuda.min.js.map pages/roderuda/ 2>/dev/null || true
          # Generate index page
          cat > pages/roderuda/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>RodEruda CDN</title>
            <style>
              body { font-family: sans-serif; max-width: 820px; margin: 40px auto; padding: 0 20px; }
              pre { background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; }
              a { color: #0070f3; }
            </style>
          </head>
          <body>
            <h1>RodEruda</h1>
            <p>Console for Mobile Browsers — fork of <a href="https://github.com/liriliri/eruda">Eruda</a></p>

            <h2>Files</h2>
            <ul>
              <li><a href="roderuda.js">roderuda.js</a> — non-minified with sourcemap</li>
              <li><a href="roderuda.min.js">roderuda.min.js</a> — minified with sourcemap</li>
              <li><a href="roderuda.with-comments.js">roderuda.with-comments.js</a> — non-minified, comments preserved</li>
            </ul>

            <h2>Usage</h2>
            <pre>&lt;script src="https://oirodolfo.github.io/eruda-console-browser/roderuda/roderuda.js"&gt;&lt;/script&gt;
          &lt;script&gt;RodEruda.init();&lt;/script&gt;</pre>

            <pre>&lt;!-- Minified --&gt;
          &lt;script src="https://oirodolfo.github.io/eruda-console-browser/roderuda/roderuda.min.js"&gt;&lt;/script&gt;
          &lt;script&gt;RodEruda.init();&lt;/script&gt;</pre>

            <pre>&lt;!-- With comments preserved --&gt;
          &lt;script src="https://oirodolfo.github.io/eruda-console-browser/roderuda/roderuda.with-comments.js"&gt;&lt;/script&gt;
          &lt;script&gt;RodEruda.init();&lt;/script&gt;</pre>

            <p><a href="https://github.com/oirodolfo/eruda-console-browser">GitHub Repository</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload dist to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: roderuda-dist
          path: dist/

      - name: Upload built files to Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          file_path: dist/roderuda.js
          file_type: text
