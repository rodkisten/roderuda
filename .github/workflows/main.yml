name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable corepack
        run: corepack enable
      
      - name: Prepare pnpm
        run: corepack prepare pnpm@11.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        run: pnpm ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      #- name: Test
      #  run: pnpm test

      - name: Verify dist files
        run: |
          ls -lh dist/
          test -f dist/roderuda.js
          test -f dist/roderuda.min.js
          test -f dist/roderuda.with-comments.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roderuda-dist
          path: dist/
