name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify dist files
        run: |
          ls -lh dist/
          test -f dist/roderuda.js
          test -f dist/roderuda.min.js
          test -f dist/roderuda.with-comments.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roderuda-dist
          path: dist/
