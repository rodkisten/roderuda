name: 🔒 Update pnpm lockfile
on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message for the updated lockfile"
        required: false
        default: "chore(deps): update pnpm lockfile"
        type: string
# The workflow commits directly to the branch selected in the Actions UI.
permissions:
  contents: write
concurrency:
  group: update-pnpm-lock-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update-lockfile:
    name: 📦 Install and commit lockfile
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: 📥 Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinning the version keeps the generated lockfile deterministic.
          version: 11.7.0
          # Installation is performed explicitly after Node.js is configured.
          run_install: false
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          # Explicitly disable automatic package-manager caching.
          package-manager-cache: false
      - name: 🧹 Configure isolated pnpm store
        shell: bash
        run: |
          # Use a brand-new store for every workflow run.
          # Nothing can be restored from or shared with another execution.
          STORE_DIR="$RUNNER_TEMP/pnpm-store-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          pnpm config set store-dir "$STORE_DIR"
          echo "📦 pnpm store: $(pnpm store path)"
          echo "🟢 Node: $(node --version)"
          echo "📦 pnpm: $(pnpm --version)"
      - name: 🗑️ Remove existing dependency artifacts
        shell: bash
        run: |
          # Remove dependency trees that could have been committed, restored,
          # generated by previous steps, or left inside workspace packages.
          find . \
            -type d \
            -name node_modules \
            -prune \
            -exec rm -rf '{}' +
          rm -rf .pnpm-store
      - name: 🧩 Install dependencies without cache reuse
        run: |
          # --force recreates the modules directory and re-resolves packages
          # instead of trusting an existing installation state.
          pnpm install \
            --no-frozen-lockfile \
            --force
      - name: 🔎 Check lockfile changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ pnpm-lock.yaml is already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📝 pnpm-lock.yaml was updated."
            git diff --stat -- pnpm-lock.yaml
          fi
      - name: 💾 Commit updated lockfile
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          # Use GitHub's bot identity so the commit remains clearly automated.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "$COMMIT_MESSAGE"
      - name: 🚀 Push commit
        if: steps.changes.outputs.changed == 'true'
        run: git push origin "HEAD:${{ github.ref_name }}"
      - name: ✨ Nothing to update
        if: steps.changes.outputs.changed != 'true'
        run: echo "The lockfile was already synchronized with package manifests."
