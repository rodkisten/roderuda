name: 🔒 Update pnpm lockfile

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.npmrc'
      - 'pnpmfile.cjs'
      - 'patches/**'

  workflow_dispatch:
    inputs:
      package:
        description: "Package to install, e.g. react, vite@latest or @types/node@^24"
        required: false
        default: ""
        type: string

      dev_dependency:
        description: "Install package as devDependency"
        required: false
        default: false
        type: boolean

      commit_message:
        description: "Commit message (leave empty to generate automatically)"
        required: false
        default: ""
        type: string

# The workflow commits directly to the selected branch.
permissions:
  contents: write

concurrency:
  group: update-pnpm-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-lockfile:
    name: 📦 Update dependencies and lockfile
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinning the version keeps lockfile generation deterministic.
          version: 11.7.0
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

          # This workflow intentionally generates dependency metadata
          # without reusing the caches from build or CI workflows.
          package-manager-cache: false

      - name: 🧹 Configure isolated pnpm store
        shell: bash
        run: |
          set -euo pipefail

          # Every execution gets a fresh pnpm store.
          STORE_DIR="$RUNNER_TEMP/pnpm-store-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"

          pnpm config set store-dir "$STORE_DIR"

          echo "📦 pnpm store: $(pnpm store path)"
          echo "🟢 Node: $(node --version)"
          echo "📦 pnpm: $(pnpm --version)"

      - name: 📦 Add dependency or update lockfile
        id: dependency
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          DEV_DEPENDENCY: ${{ inputs.dev_dependency }}
        run: |
          set -euo pipefail

          # A package is only provided during a manual workflow_dispatch.
          # Push-triggered runs simply synchronize the existing lockfile.
          if [[ -n "${PACKAGE:-}" ]]; then
            ADD_ARGS=()

            # pnpm prevents accidental additions to a workspace root.
            # Explicitly target the root when this repository is a workspace.
            if [[ -f "pnpm-workspace.yaml" ]]; then
              ADD_ARGS+=(--workspace-root)
            fi

            if [[ "${DEV_DEPENDENCY:-false}" == "true" ]]; then
              ADD_ARGS+=(--save-dev)

              echo "🧪 Adding devDependency: ${PACKAGE}"
              echo "dependency_type=devDependency" >> "$GITHUB_OUTPUT"
            else
              echo "📦 Adding dependency: ${PACKAGE}"
              echo "dependency_type=dependency" >> "$GITHUB_OUTPUT"
            fi

            # Bash arrays preserve argument boundaries and prevent the package
            # input from being interpreted as arbitrary shell commands.
            pnpm add \
              "${ADD_ARGS[@]}" \
              "$PACKAGE"

            echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
            echo "package_added=true" >> "$GITHUB_OUTPUT"

            exit 0
          fi

          echo "🔐 No package requested. Synchronizing pnpm-lock.yaml."

          # Only resolve the dependency graph and update the lockfile.
          # node_modules does not need to be materialized in this mode.
          pnpm install \
            --lockfile-only \
            --no-frozen-lockfile

          echo "package_added=false" >> "$GITHUB_OUTPUT"

      - name: 🔎 Check dependency changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          # git status detects both tracked changes and newly created files,
          # unlike git diff alone, which ignores untracked files.
          CHANGES="$(
            git status \
              --porcelain \
              -- \
              package.json \
              pnpm-lock.yaml
          )"

          if [[ -z "$CHANGES" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ Dependencies and pnpm-lock.yaml are already up to date."

            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

          echo "📝 Dependency files changed:"
          echo "$CHANGES"

          echo ""
          echo "📊 Diff summary:"

          git diff \
            --stat \
            -- \
            package.json \
            pnpm-lock.yaml \
            || true

      - name: 💾 Commit dependency changes
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          INPUT_COMMIT_MESSAGE: ${{ inputs.commit_message }}
          PACKAGE: ${{ inputs.package }}
          DEV_DEPENDENCY: ${{ inputs.dev_dependency }}
        run: |
          set -euo pipefail

          COMMIT_MESSAGE="${INPUT_COMMIT_MESSAGE:-}"

          # Generate a meaningful commit message when the manual input
          # was left empty.
          if [[ -z "$COMMIT_MESSAGE" ]]; then
            if [[ -n "${PACKAGE:-}" ]]; then
              if [[ "${DEV_DEPENDENCY:-false}" == "true" ]]; then
                COMMIT_MESSAGE="chore(dev-deps): add ${PACKAGE}"
              else
                COMMIT_MESSAGE="chore(deps): add ${PACKAGE}"
              fi
            else
              COMMIT_MESSAGE="chore(deps): update pnpm lockfile"
            fi
          fi

          git config \
            user.name \
            "github-actions[bot]"

          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          # pnpm add can modify both package.json and pnpm-lock.yaml.
          # A lockfile-only update normally changes only pnpm-lock.yaml.
          git add \
            package.json \
            pnpm-lock.yaml

          git commit \
            -m "$COMMIT_MESSAGE"

      - name: 🚀 Push dependency changes
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git push \
            origin \
            "HEAD:${{ github.ref_name }}"

      - name: ✨ Nothing to update
        if: steps.changes.outputs.changed != 'true'
        run: |
          echo "Dependencies and pnpm-lock.yaml are already synchronized."
