name: 🔒 Update pnpm lockfile

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.npmrc'
      - 'pnpmfile.cjs'
      - 'patches/**'

  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message for the updated lockfile"
        required: false
        default: "chore(deps): update pnpm lockfile"
        type: string

# The workflow commits directly to the branch selected in the Actions UI.
permissions:
  contents: write

concurrency:
  group: update-pnpm-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-lockfile:
    name: 📦 Update and commit lockfile
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinning the version keeps lockfile generation deterministic.
          version: 11.7.0
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

          # Lockfile generation intentionally uses an isolated pnpm store.
          package-manager-cache: false

      - name: 🧹 Configure isolated pnpm store
        shell: bash
        run: |
          set -euo pipefail

          # Each execution gets a fresh pnpm store. No dependency cache
          # is restored or shared with CI or publishing workflows.
          STORE_DIR="$RUNNER_TEMP/pnpm-store-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"

          pnpm config set store-dir "$STORE_DIR"

          echo "📦 pnpm store: $(pnpm store path)"
          echo "🟢 Node: $(node --version)"
          echo "📦 pnpm: $(pnpm --version)"

      - name: 🔐 Generate pnpm lockfile
        shell: bash
        run: |
          set -euo pipefail

          # Only resolve and update the lockfile. There is no reason to
          # materialize node_modules when this workflow only commits the lockfile.
          pnpm install \
            --lockfile-only \
            --no-frozen-lockfile

      - name: 🔎 Check lockfile changes
        id: lockfile
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- pnpm-lock.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ pnpm-lock.yaml is already up to date."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "📝 pnpm-lock.yaml was updated."

          git diff --stat -- pnpm-lock.yaml

      - name: 💾 Commit updated lockfile
        if: steps.lockfile.outputs.changed == 'true'
        shell: bash
        env:
          INPUT_COMMIT_MESSAGE: ${{ github.event.inputs.commit_message }}
        run: |
          set -euo pipefail

          # workflow_dispatch provides the custom/default input.
          # Push events do not have this input, so use the standard fallback.
          COMMIT_MESSAGE="${
            INPUT_COMMIT_MESSAGE:-chore(deps): update pnpm lockfile
          }"

          git config \
            user.name \
            "github-actions[bot]"

          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add pnpm-lock.yaml

          git commit \
            -m "$COMMIT_MESSAGE"

      - name: 🚀 Push updated lockfile
        if: steps.lockfile.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git push \
            origin \
            "HEAD:${{ github.ref_name }}"

      - name: ✨ Nothing to update
        if: steps.lockfile.outputs.changed != 'true'
        run: |
          echo "The lockfile is already synchronized with package manifests."
